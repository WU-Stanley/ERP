<div class="relative">
  <button type="button" (click)="togglePanel()" class="relative flex h-10 w-10 items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 text-slate-700 transition hover:border-wigwe-green hover:text-wigwe-green">
    <span class="material-symbols-outlined text-lg">notifications</span>
    @if(unreadCount > 0) {
    <span class="absolute -right-1 -top-1 flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-wigwe-green px-1 text-[10px] font-black text-white">
      {{ unreadCount }}
    </span>
    }
  </button>

  @if(openPanel) {
  <div class="absolute right-0 z-50 mt-3 w-96 overflow-hidden rounded-[1.75rem] border border-slate-100 bg-white p-4 shadow-xl shadow-slate-900/10">
    <div class="flex items-center justify-between">
      <p class="text-sm font-black text-slate-900">Notifications</p>
      <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">{{ unreadCount }} unread</span>
    </div>

    <div class="mt-4 max-h-80 space-y-3 overflow-y-auto">
      @for (item of notifications; track item.id) {
      <div class="rounded-2xl border p-3 transition" [class.border-slate-100.bg-slate-50]="!item.isRead" [class.border-transparent.bg-white]="item.isRead" (click)="markRead(item.id)">
        <p class="text-[11px] font-black uppercase tracking-widest text-slate-400">{{ item.type }}</p>
        <p class="mt-1 text-sm font-black text-slate-900">{{ item.title }}</p>
        <p class="mt-1 text-xs font-bold text-slate-500">{{ item.message }}</p>
        <p class="mt-2 text-[10px] font-bold text-slate-400">{{ item.createdAt | date: 'MMM d, y HH:mm' }}</p>
      </div>
      }
    </div>
  </div>
  }
</div>
