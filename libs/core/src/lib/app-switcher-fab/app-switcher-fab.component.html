<div class="relative">
  <button
    type="button"
    class="grid h-11 w-11 place-items-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-wigwe-green/10"
    aria-label="Open apps menu"
    aria-haspopup="true"
    [attr.aria-expanded]="menuOpen"
    (click)="toggleMenu()"
    (keydown)="onKeydown($event)"
  >
    <span class="grid grid-cols-3 gap-1" aria-hidden="true">
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
      <span class="h-1.5 w-1.5 rounded-full bg-current"></span>
    </span>
  </button>

  <div
    *ngIf="menuOpen"
    class="absolute right-0 top-14 z-50 w-80 rounded-[2rem] border border-slate-100 bg-white p-4 shadow-2xl shadow-slate-900/15"
  >
    <div class="mb-3 flex items-center justify-between px-2">
      <div>
        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-wigwe-gold">
          Wigwe apps
        </p>
        <h2 class="text-sm font-black text-slate-900">Switch workspace</h2>
      </div>
      <button
        type="button"
        class="grid h-8 w-8 place-items-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
        aria-label="Close apps menu"
        (click)="closeMenu()"
      >
        <span class="material-symbols-outlined text-lg">close</span>
      </button>
    </div>

    <div class="grid grid-cols-3 gap-2">
      <ng-container *ngFor="let app of apps; trackBy: trackByName">
        <a
          *ngIf="app.external; else internalAppLink"
          [href]="app.path"
          target="_blank"
          rel="noopener noreferrer"
          (click)="closeMenu()"
          class="group flex min-h-24 flex-col items-center justify-center rounded-2xl p-3 text-center transition hover:bg-slate-50 focus:bg-slate-50 focus:outline-none"
        >
          <ng-container *ngTemplateOutlet="appTile; context: { $implicit: app }"></ng-container>
        </a>

        <ng-template #internalAppLink>
          <a
            [routerLink]="app.path"
            (click)="closeMenu()"
            class="group flex min-h-24 flex-col items-center justify-center rounded-2xl p-3 text-center transition hover:bg-slate-50 focus:bg-slate-50 focus:outline-none"
          >
            <ng-container *ngTemplateOutlet="appTile; context: { $implicit: app }"></ng-container>
          </a>
        </ng-template>
      </ng-container>
    </div>
  </div>
</div>

<ng-template #appTile let-app>
  <span
    class="grid h-11 w-11 place-items-center rounded-2xl text-white shadow-lg shadow-slate-900/10 transition group-hover:-translate-y-0.5"
    [ngClass]="app.color"
  >
    <span class="material-symbols-outlined text-xl">{{ app.icon }}</span>
  </span>
  <span class="mt-2 max-w-full truncate text-xs font-bold text-slate-600">
    {{ app.name }}
  </span>
</ng-template>
