<section
  class="min-h-screen grid place-items-center bg-gradient-to-br from-slate-50 to-blue-100 px-6 py-8"
>
  <div class="w-full max-w-[420px] rounded-2xl border border-slate-200 bg-white p-6 shadow-xl shadow-slate-900/5">
    <h1 class="m-0 text-2xl font-semibold text-slate-900">Sign in</h1>
    <p class="mt-2 mb-5 text-sm text-slate-600">Use your LMS account or continue with Microsoft.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onEmailPasswordLogin()" novalidate class="grid gap-2">
      <label for="email" class="mt-1 text-sm font-medium text-slate-800">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm text-slate-900 outline-none ring-0 transition focus:border-blue-600 focus:ring-4 focus:ring-blue-200"
      />
      <small *ngIf="hasError('email', 'required')" class="text-xs text-rose-700">Email is required.</small>
      <small *ngIf="hasError('email', 'email')" class="text-xs text-rose-700">
        Enter a valid email address.
      </small>

      <label for="password" class="mt-1 text-sm font-medium text-slate-800">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm text-slate-900 outline-none ring-0 transition focus:border-blue-600 focus:ring-4 focus:ring-blue-200"
      />
      <small *ngIf="hasError('password', 'required')" class="text-xs text-rose-700">
        Password is required.
      </small>
      <small *ngIf="hasError('password', 'minlength')" class="text-xs text-rose-700">
        Password must be at least 6 characters.
      </small>

      <button
        type="submit"
        [disabled]="isSubmitting"
        class="mt-3 rounded-lg bg-blue-700 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isSubmitting ? 'Signing in...' : 'Sign in with email' }}
      </button>

      <small *ngIf="authError" class="mt-1 text-xs text-rose-700">{{ authError }}</small>
      <small *ngIf="authSuccess" class="mt-1 text-xs text-emerald-700">{{ authSuccess }}</small>
    </form>

    <div class="relative my-5 text-center text-sm text-slate-500" aria-hidden="true">
      <span class="absolute inset-x-0 top-1/2 border-t border-slate-200"></span>
      <span class="relative bg-white px-2">or</span>
    </div>

    <button
      type="button"
      (click)="onMicrosoftLogin()"
      class="flex w-full items-center justify-center gap-3 rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-800 transition hover:bg-slate-50"
    >
      <span class="inline-flex h-5 w-5 overflow-hidden rounded-sm" aria-hidden="true">
        <svg viewBox="0 0 16 16" class="h-5 w-5">
          <rect x="0" y="0" width="7.25" height="7.25" fill="#f25022"></rect>
          <rect x="8.75" y="0" width="7.25" height="7.25" fill="#7fba00"></rect>
          <rect x="0" y="8.75" width="7.25" height="7.25" fill="#00a4ef"></rect>
          <rect x="8.75" y="8.75" width="7.25" height="7.25" fill="#ffb900"></rect>
        </svg>
      </span>
      Continue with Microsoft
    </button>
  </div>
</section>
